<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Projects</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #0d1117;
        color: #c9d1d9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 1rem;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #f0f6fc;
        letter-spacing: -0.5px;
      }

      header p {
        margin-top: 0.75rem;
        font-size: 1.1rem;
        color: #8b949e;
      }

      #link-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.25rem;
        width: 100%;
        max-width: 960px;
      }

      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1.5rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .card:hover {
        border-color: #58a6ff;
        box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
      }

      .card-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: #58a6ff;
        word-break: break-word;
      }

      .card-description {
        font-size: 0.9rem;
        color: #8b949e;
        line-height: 1.5;
        flex: 1;
      }

      .card-url {
        font-size: 0.75rem;
        color: #484f58;
        word-break: break-all;
        margin-top: 0.25rem;
      }

      #error-msg {
        color: #f85149;
        font-size: 1rem;
        margin-top: 2rem;
      }

      footer {
        margin-top: 4rem;
        font-size: 0.8rem;
        color: #484f58;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      /* Edit mode button */
      #edit-btn {
        background: none;
        border: 1px solid #30363d;
        color: #8b949e;
        padding: 0.4rem 0.9rem;
        border-radius: 6px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      #edit-btn:hover { border-color: #58a6ff; color: #58a6ff; }

      /* Edit toolbar */
      #edit-toolbar {
        display: none;
        width: 100%;
        max-width: 960px;
        margin-bottom: 1.5rem;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }
      #edit-toolbar.visible { display: flex; }

      .toolbar-btn {
        padding: 0.45rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
        border: none;
      }
      #add-card-btn {
        background: #238636;
        color: #fff;
      }
      #add-card-btn:hover { background: #2ea043; }
      #save-btn {
        background: #1f6feb;
        color: #fff;
      }
      #save-btn:hover { background: #388bfd; }
      #reset-btn {
        background: none;
        border: 1px solid #f85149;
        color: #f85149;
      }
      #reset-btn:hover { background: rgba(248,81,73,0.1); }
      #exit-btn {
        background: none;
        border: 1px solid #30363d;
        color: #8b949e;
        margin-left: auto;
      }
      #exit-btn:hover { border-color: #8b949e; color: #c9d1d9; }
      #save-status {
        font-size: 0.8rem;
        color: #3fb950;
      }

      /* Edit-mode card overrides */
      body.edit-mode .card {
        position: relative;
        pointer-events: none;
      }
      body.edit-mode .card-actions {
        display: flex;
      }
      .card-actions {
        display: none;
        gap: 0.5rem;
        margin-top: 0.5rem;
        pointer-events: all;
      }
      .card-action-btn {
        font-size: 0.75rem;
        padding: 0.3rem 0.65rem;
        border-radius: 5px;
        cursor: pointer;
        border: none;
      }
      .edit-card-btn { background: #1f6feb; color: #fff; }
      .edit-card-btn:hover { background: #388bfd; }
      .delete-card-btn { background: #da3633; color: #fff; }
      .delete-card-btn:hover { background: #f85149; }

      /* Modal */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #modal-overlay.visible { display: flex; }
      #modal {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 2rem;
        width: min(420px, 92vw);
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      #modal h2 { color: #f0f6fc; font-size: 1.2rem; }
      .modal-field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .modal-field label { font-size: 0.85rem; color: #8b949e; }
      .modal-field input, .modal-field textarea {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #c9d1d9;
        padding: 0.5rem 0.75rem;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        width: 100%;
      }
      .modal-field input:focus, .modal-field textarea:focus {
        border-color: #58a6ff;
      }
      .modal-field textarea { resize: vertical; min-height: 72px; }
      #modal-error { color: #f85149; font-size: 0.85rem; min-height: 1.1em; }
      .modal-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }
      .modal-cancel {
        background: none;
        border: 1px solid #30363d;
        color: #8b949e;
        padding: 0.45rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .modal-cancel:hover { border-color: #8b949e; }
      .modal-confirm {
        background: #1f6feb;
        border: none;
        color: #fff;
        padding: 0.45rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .modal-confirm:hover { background: #388bfd; }
    </style>
  </head>
  <body>
    <header>
      <h1 id="site-title">My Projects</h1>
      <p id="site-description"></p>
    </header>

    <div id="edit-toolbar">
      <button class="toolbar-btn" id="add-card-btn">+ Add Card</button>
      <button class="toolbar-btn" id="save-btn">💾 Save</button>
      <button class="toolbar-btn" id="reset-btn">↺ Reset to default</button>
      <span id="save-status"></span>
      <button class="toolbar-btn" id="exit-btn">Exit edit mode</button>
    </div>

    <div id="link-grid"></div>
    <p id="error-msg" hidden></p>

    <!-- Generic modal (password prompt + card editor) -->
    <div id="modal-overlay" role="dialog" aria-modal="true">
      <div id="modal">
        <h2 id="modal-title"></h2>
        <div id="modal-body"></div>
        <p id="modal-error"></p>
        <div class="modal-actions">
          <button class="modal-cancel" id="modal-cancel">Cancel</button>
          <button class="modal-confirm" id="modal-confirm">OK</button>
        </div>
      </div>
    </div>

    <footer>
      <p>My public GitHub Pages</p>
      <button id="edit-btn">✏️ Edit page</button>
    </footer>

    <script>
      const STORAGE_KEY = "gvibe_links";
      const REMOVED_KEY = "gvibe_removed";
      // Note: This password is intentionally client-side only. It acts as a
      // lightweight barrier, not true security — anyone viewing the source can
      // see it. For stronger access control a server-side solution is required.
      const PASSWORD = "peanutngo";

      let currentLinks = [];
      let defaultData = null;
      let editMode = false;
      let removedUrls = new Set();

      /* ── Modal helpers ── */
      const overlay = document.getElementById("modal-overlay");
      const modalTitle = document.getElementById("modal-title");
      const modalBody = document.getElementById("modal-body");
      const modalError = document.getElementById("modal-error");
      const modalConfirm = document.getElementById("modal-confirm");
      const modalCancel = document.getElementById("modal-cancel");

      function openModal(title, bodyHTML, onConfirm) {
        modalTitle.textContent = title;
        modalBody.innerHTML = bodyHTML;
        modalError.textContent = "";
        overlay.classList.add("visible");

        const newConfirm = modalConfirm.cloneNode(true);
        modalConfirm.replaceWith(newConfirm);
        newConfirm.addEventListener("click", () => onConfirm(newConfirm));

        const newCancel = modalCancel.cloneNode(true);
        modalCancel.replaceWith(newCancel);
        newCancel.addEventListener("click", closeModal);
      }

      function closeModal() {
        overlay.classList.remove("visible");
      }

      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closeModal();
      });

      /* ── Password prompt ── */
      function promptPassword(onSuccess) {
        openModal(
          "Enter password to edit",
          `<div class="modal-field">
            <label for="pw-input">Password</label>
            <input id="pw-input" type="password" autocomplete="current-password" />
          </div>`,
          () => {
            const pw = document.getElementById("pw-input").value;
            if (pw === PASSWORD) {
              closeModal();
              onSuccess();
            } else {
              document.getElementById("modal-error").textContent =
                "Incorrect password.";
            }
          }
        );
        setTimeout(() => {
          const input = document.getElementById("pw-input");
          if (input) {
            input.focus();
            input.addEventListener("keydown", (e) => {
              if (e.key === "Enter") document.getElementById("modal-confirm").click();
            });
          }
        }, 50);
      }

      /* ── Card editor modal ── */
      function openCardEditor(link, onSave) {
        openModal(
          link ? "Edit card" : "Add card",
          `<div class="modal-field">
            <label for="card-name">Name</label>
            <input id="card-name" type="text" value="${escHtml(link ? link.name : "")}" />
          </div>
          <div class="modal-field">
            <label for="card-url">URL</label>
            <input id="card-url" type="url" value="${escHtml(link ? link.url : "")}" />
          </div>
          <div class="modal-field">
            <label for="card-desc">Description</label>
            <textarea id="card-desc">${escHtml(link ? link.description : "")}</textarea>
          </div>`,
          () => {
            const name = document.getElementById("card-name").value.trim();
            const url = document.getElementById("card-url").value.trim();
            const description = document.getElementById("card-desc").value.trim();
            if (!url) {
              document.getElementById("modal-error").textContent = "URL is required.";
              return;
            }
            closeModal();
            onSave({ name: name || url, url, description });
          }
        );
        setTimeout(() => {
          const input = document.getElementById("card-name");
          if (input) input.focus();
        }, 50);
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ── Render cards ── */
      function renderCards(links) {
        const grid = document.getElementById("link-grid");
        grid.innerHTML = "";

        links.forEach((link, idx) => {
          if (!link.url) return;

          const wrapper = document.createElement("div");
          wrapper.className = "card";

          const a = document.createElement("a");
          a.href = link.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.style.textDecoration = "none";
          a.style.color = "inherit";
          a.style.display = "flex";
          a.style.flexDirection = "column";
          a.style.gap = "0.5rem";
          a.style.flex = "1";

          const nameEl = document.createElement("div");
          nameEl.className = "card-name";
          nameEl.textContent = link.name || link.url;

          const descEl = document.createElement("div");
          descEl.className = "card-description";
          descEl.textContent = link.description || "";

          const urlEl = document.createElement("div");
          urlEl.className = "card-url";
          urlEl.textContent = link.url;

          a.append(nameEl, descEl, urlEl);

          const actions = document.createElement("div");
          actions.className = "card-actions";

          const editBtn = document.createElement("button");
          editBtn.className = "card-action-btn edit-card-btn";
          editBtn.textContent = "Edit";
          editBtn.addEventListener("click", () => {
            openCardEditor(currentLinks[idx], (updated) => {
              currentLinks[idx] = updated;
              renderCards(currentLinks);
            });
          });

          const delBtn = document.createElement("button");
          delBtn.className = "card-action-btn delete-card-btn";
          delBtn.textContent = "Delete";
          delBtn.addEventListener("click", () => {
            if (!confirm(`Delete "${currentLinks[idx].name || currentLinks[idx].url}"?`)) return;
            const deletedUrl = currentLinks[idx].url;
            currentLinks.splice(idx, 1);
            if (deletedUrl) removedUrls.add(deletedUrl);
            renderCards(currentLinks);
          });

          actions.append(editBtn, delBtn);
          wrapper.append(a, actions);
          grid.appendChild(wrapper);
        });
      }

      /* ── Edit mode ── */
      function enterEditMode() {
        editMode = true;
        document.body.classList.add("edit-mode");
        document.getElementById("edit-toolbar").classList.add("visible");
        document.getElementById("save-status").textContent = "";
      }

      function exitEditMode() {
        editMode = false;
        document.body.classList.remove("edit-mode");
        document.getElementById("edit-toolbar").classList.remove("visible");
      }

      document.getElementById("edit-btn").addEventListener("click", () => {
        if (editMode) return;
        promptPassword(enterEditMode);
      });

      document.getElementById("exit-btn").addEventListener("click", exitEditMode);

      document.getElementById("add-card-btn").addEventListener("click", () => {
        openCardEditor(null, (newLink) => {
          currentLinks.push(newLink);
          renderCards(currentLinks);
        });
      });

      document.getElementById("save-btn").addEventListener("click", () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(currentLinks));
        localStorage.setItem(REMOVED_KEY, JSON.stringify([...removedUrls]));
        const status = document.getElementById("save-status");
        status.textContent = "Saved!";
        setTimeout(() => { status.textContent = ""; }, 2500);
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        if (!confirm("Reset to default? Your saved changes will be lost.")) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(REMOVED_KEY);
        removedUrls = new Set();
        currentLinks = defaultData.links.map((l) => ({ ...l }));
        renderCards(currentLinks);
        const status = document.getElementById("save-status");
        status.textContent = "Reset to default.";
        setTimeout(() => { status.textContent = ""; }, 2500);
      });

      /* ── Load data ── */
      async function loadLinks() {
        const errorMsg = document.getElementById("error-msg");

        let data;
        try {
          const response = await fetch("links.json");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          data = await response.json();
        } catch (err) {
          errorMsg.textContent =
            "Could not load links.json. Make sure the file exists and is valid JSON.";
          errorMsg.hidden = false;
          return;
        }

        defaultData = data;

        if (data.title) {
          document.title = data.title;
          document.getElementById("site-title").textContent = data.title;
        }
        if (data.description) {
          document.getElementById("site-description").textContent =
            data.description;
        }

        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const savedLinks = JSON.parse(saved);
            const savedRemovedRaw = localStorage.getItem(REMOVED_KEY);
            removedUrls = new Set(savedRemovedRaw ? JSON.parse(savedRemovedRaw) : []);
            const savedUrls = new Set(savedLinks.filter((l) => l.url).map((l) => l.url));
            // Merge any new cards added by the daily sync that aren't already
            // present in the user's saved state and haven't been deleted before.
            const newLinks = (data.links || []).filter(
              (l) => l.url && !savedUrls.has(l.url) && !removedUrls.has(l.url)
            );
            currentLinks = [...savedLinks, ...newLinks];
          } catch (err) {
            console.warn("Failed to parse saved links from localStorage:", err);
            currentLinks = Array.isArray(data.links) ? data.links.map((l) => ({ ...l })) : [];
          }
        } else {
          currentLinks = Array.isArray(data.links) ? data.links.map((l) => ({ ...l })) : [];
        }

        if (currentLinks.length === 0) {
          errorMsg.textContent =
            'No links found. Use the Edit button to add cards.';
          errorMsg.hidden = false;
          return;
        }

        renderCards(currentLinks);
      }

      loadLinks();
    </script>
  </body>
</html>
